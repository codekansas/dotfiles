interface:
  display_name: "Optimize"
  short_description: "Run an autonomous optimization loop with helper subagents"
  default_prompt: "Use $optimize with a natural-language optimization goal, stay alive as the long-running coordinator, never hand off control of the loop itself, never pause between iterations, keep going unattended until explicitly interrupted, create and reuse exactly two helper subagents across the run, run the experiments yourself, send bounded results-and-next-step work to $do-optimize-step, and send loop repairs to $fix-optimize-loop."
