# Forward only Option+Enter to Zellij's Alt+Enter binding.
map opt+enter send_key alt+enter

# Keep the tab bar visible so its built-in mouse UI is always available:
# drag tabs to reorder them, and double-click a tab to rename it.
tab_bar_min_tabs 1

# Enable kitty 0.46+'s mouse drag UI for tabs and window title bars.
drag_threshold 5

# Remap tab navigation from ctrl+shift+arrows to option+shift+arrows.
map ctrl+shift+right
map ctrl+shift+left
map opt+shift+right next_tab
map opt+shift+left previous_tab

# Reorder and rename tabs without reaching for Kitty's ctrl+shift defaults.
map opt+shift+. move_tab_forward
map opt+shift+, move_tab_backward
map opt+shift+t set_tab_title
