# Mouse mode
set -g mouse on
bind-key M \
  set-option -g mouse on \;\
  display-message 'Mouse: ON'
bind-key m \
  set-option -g mouse off \;\
  display-message 'Mouse: OFF'

# Use ` as prefix instead of C-b
unbind C-b
set -g prefix `
bind-key ` send-prefix
set -g base-index 1

# Navigate panes with Option+Left/Right.
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Enter select-layout even-horizontal

# window sizing
# set-window-option -g aggressive-resize on
# This option seems to not be supported on some Linux systems
# bind-key r \
#   resize-window -A \;\
#   display-message 'Resized to full screen'

# Default shell
set-option -g default-shell /bin/zsh

# tmux plugin manager
set -g @plugin 'tmux-plugins/tpm'

# tmux yank
set -g @plugin 'tmux-plugins/tmux-yank'

# Zellij-like selection: drag to select, copy to clipboard on release, and exit
# copy mode after copying.
setw -g mode-keys vi
set -g mode-style 'bg=colour250,fg=black'
set -g word-separators ''
set -s set-clipboard on
set -g @override_copy_command 'if command -v reattach-to-user-namespace >/dev/null 2>&1 && command -v pbcopy >/dev/null 2>&1; then reattach-to-user-namespace pbcopy; elif command -v pbcopy >/dev/null 2>&1; then pbcopy; elif command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xsel >/dev/null 2>&1; then xsel -i --clipboard; elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard -in; else tmux display-message "No clipboard command found"; cat >/dev/null; fi'
set -g @yank_action 'copy-pipe-and-cancel'
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'
set -g @yank_with_mouse on

bind-key [ copy-mode
bind -T copy-mode    Space send -X begin-selection
bind -T copy-mode-vi Space send -X begin-selection
bind -T copy-mode-vi v     send -X begin-selection
bind -T copy-mode    Enter send -X copy-pipe-and-cancel "#{@override_copy_command}"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "#{@override_copy_command}"
bind -T copy-mode    C-c   send -X copy-pipe-and-cancel "#{@override_copy_command}"
bind -T copy-mode-vi C-c   send -X copy-pipe-and-cancel "#{@override_copy_command}"
bind -T copy-mode    y     send -X copy-pipe-and-cancel "#{@override_copy_command}"
bind -T copy-mode-vi y     send -X copy-pipe-and-cancel "#{@override_copy_command}"
bind -T root         MouseDrag1Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -M ; send -X selection-mode word }
bind -T root         DoubleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H ; send -X select-word ; send -X selection-mode word }
bind -T copy-mode    MouseDrag1Pane select-pane \; send -X begin-selection \; send -X selection-mode word
bind -T copy-mode-vi MouseDrag1Pane select-pane \; send -X begin-selection \; send -X selection-mode word
bind -T copy-mode    DoubleClick1Pane select-pane \; send -X select-word \; send -X selection-mode word
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; send -X selection-mode word
bind -T copy-mode    MouseDragEnd1Pane send -X copy-pipe-and-cancel "#{@override_copy_command}"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "#{@override_copy_command}"

run '~/.tmux/plugins/tpm/tpm'
